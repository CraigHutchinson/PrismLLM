name: Prism Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Unit + integration tests with coverage (Python matrix)
  # ──────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ --ignore=tests/smoke --cov=scripts --cov=hooks --cov-report=xml --cov-fail-under=80

      - name: Check security-critical coverage (pii_scan, prism_preparser)
        run: |
          PYTHONPATH=scripts:hooks pytest tests/unit/test_pii_scan.py tests/integration/test_hook_preparser.py \
            --cov=pii_scan --cov=prism_preparser \
            --cov-fail-under=100

      - name: Validate JSON schemas
        run: |
          python -c "
          import json, pathlib
          for f in pathlib.Path('scripts/schemas').glob('*.json'):
              json.loads(f.read_text())
              print(f'OK: {f.name}')
          for f in pathlib.Path('knowledge-base').glob('*.json'):
              json.loads(f.read_text())
              print(f'OK: {f.name}')
          "

      - name: Validate verbosity_patterns.json structure
        run: |
          python -c "
          import json
          data = json.loads(open('scripts/verbosity_patterns.json').read())
          assert 'patterns' in data, 'Missing patterns key'
          assert len(data['patterns']) >= 20, 'Too few patterns'
          required = {'phrase', 'category', 'terse_alt', 'token_saving'}
          for p in data['patterns']:
              missing = required - set(p.keys())
              assert not missing, f'Pattern missing fields: {missing}'
          print(f'OK: {len(data[\"patterns\"])} patterns validated')
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11' && always()
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Smoke tests — exercise real CLI surface end-to-end
  # ──────────────────────────────────────────────────────────────────
  smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run smoke tests
        run: PYTHONPATH=scripts:hooks pytest tests/smoke/ -v

  # ──────────────────────────────────────────────────────────────────
  # Job 3: Install-from-scratch — simulates a new user following README
  #   Only runtime deps (requirements.txt, no test extras).
  #   Validates that install instructions are complete and correct.
  # ──────────────────────────────────────────────────────────────────
  install-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies only (as a new user would)
        run: pip install -r requirements.txt

      - name: Run install verifier
        run: python scripts/verify_install.py

      - name: Smoke-test core CLIs without test framework
        run: |
          # pii_scan — clean prompt
          python scripts/pii_scan.py "hello world" --json
          # stage2_gate — specific prompt via stdin
          echo "Fix the auth token refresh bug in src/auth/refresh.py" | python scripts/stage2_gate.py
          # hook_installer — status check
          python scripts/hook_installer.py --action status
          # kb_query — pillar filter
          python scripts/kb_query.py --pillar refraction --count
          # overhead_calc — compute token estimates
          python scripts/overhead_calc.py --print
